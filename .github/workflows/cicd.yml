name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          pip install flask pytest flake8 bandit

      - name: Run Tests
        run: pytest || true

      - name: Lint Validation
        run: flake8 . || true

      - name: Security Scan
        run: bandit -r . || true

      - name: Build Docker Image
        run: docker build -t ai-finance-app . || true

      - name: Deployment Simulation
        run: echo "Deployment Success"
